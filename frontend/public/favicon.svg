<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="puckGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#3d3d5c" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#1a1a2e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="boltGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>

  <!-- Hockey puck body -->
  <ellipse cx="32" cy="44" rx="27" ry="10" fill="#111827"/>
  <rect x="5" y="32" width="54" height="12" fill="#111827"/>
  <ellipse cx="32" cy="32" rx="27" ry="10" fill="#1e293b"/>
  <ellipse cx="32" cy="32" rx="27" ry="10" fill="url(#puckGrad)"/>

  <!-- Ice ring on puck surface -->
  <ellipse cx="32" cy="31" rx="19" ry="5" fill="none" stroke="#5bc0eb" stroke-width="1.5" opacity="0.35"/>

  <!-- Lightning bolt - power play -->
  <path d="M36 22 L27 34 L33 34 L28 42 L39 29 L33 29 Z" fill="url(#boltGrad)" stroke="#7dd3fc" stroke-width="0.5" opacity="0.95"/>

  <!-- Subtle glow behind bolt -->
  <path d="M36 22 L27 34 L33 34 L28 42 L39 29 L33 29 Z" fill="#5bc0eb" opacity="0.15" filter="blur(2px)"/>
</svg>
