<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Hockey puck body - dark with ice reflection -->
  <ellipse cx="32" cy="42" rx="26" ry="10" fill="#1a1a2e"/>
  <rect x="6" y="32" width="52" height="10" fill="#1a1a2e"/>
  <ellipse cx="32" cy="32" rx="26" ry="10" fill="#2d2d44"/>

  <!-- Puck top highlight -->
  <ellipse cx="32" cy="32" rx="26" ry="10" fill="url(#puckGrad)"/>

  <!-- Ice streak across puck -->
  <ellipse cx="32" cy="31" rx="18" ry="4" fill="none" stroke="#5bc0eb" stroke-width="1.2" opacity="0.5"/>

  <!-- Lightning bolt / power play symbol -->
  <path d="M35 24 L28 33 L33 33 L29 40 L38 30 L33 30 Z" fill="#5bc0eb" opacity="0.9"/>

  <!-- Subtle AI circuit dots on puck -->
  <circle cx="20" cy="32" r="1" fill="#5bc0eb" opacity="0.3"/>
  <circle cx="44" cy="32" r="1" fill="#5bc0eb" opacity="0.3"/>
  <circle cx="26" cy="28" r="0.8" fill="#5bc0eb" opacity="0.2"/>
  <circle cx="38" cy="36" r="0.8" fill="#5bc0eb" opacity="0.2"/>

  <defs>
    <radialGradient id="puckGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#3d3d5c" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#1a1a2e" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
